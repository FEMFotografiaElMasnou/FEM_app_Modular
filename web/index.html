<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEM Fotografia El Masnou</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #06121e;
    --surface:     #0d2137;
    --surface2:    #102748;
    --surface3:    #163254;
    --border:      #1a3566;
    --border2:     #24477e;
    --accent:      #4b8ef5;
    --accent2:     #7bb3ff;
    --accent-glow: rgba(75,142,245,0.35);
    --text:        #e8f0ff;
    --text-muted:  #9db8e0;
    --gold:        #f5a623;
    --font-display:'Barlow Condensed', sans-serif;
    --font-body:   'Barlow', sans-serif;
    --font-mono:   'JetBrains Mono', monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    background-image:
      radial-gradient(ellipse 70% 50% at 50% -10%, #0d2a6e 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 90%, #091540 0%, transparent 50%);
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:1;
  }

  /* ── HEADER ── */
  header{
    position:relative;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:20px;
    padding:20px 24px;
  }
  .lang-switcher{
    display:flex;
    align-items:center;
    gap:2px;
    background:rgba(17,34,96,0.8);
    border:1px solid var(--border2);
    border-radius:8px;
    padding:3px;
  }
  .lang-btn{
    background:none;
    border:none;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
    color:var(--text-muted);
    padding:5px 11px;
    border-radius:6px;
    font-family:var(--font-body);
    letter-spacing:1px;
    transition:all .2s;
  }
  .lang-btn.active,.lang-btn:hover{background:var(--surface3);color:var(--accent2);}
  .header-divider{
    width:1px;
    height:18px;
    background:var(--border2);
  }
  .area-soci{
    font-family:var(--font-body);
    font-size:13px;
    font-weight:600;
    letter-spacing:.5px;
    color:var(--text-muted);
    text-decoration:none;
    cursor:pointer;
    border-bottom:1px dashed var(--border2);
    padding-bottom:2px;
    transition:color .2s,border-color .2s;
    background:none;
    border-top:none;
    border-left:none;
    border-right:none;
  }
  .area-soci:hover{color:var(--accent2);border-color:var(--accent2);}

  /* ── HERO ── */
  main{
    position:relative;
    z-index:5;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px 24px 60px;
    gap:22px;
  }
  .brand-icon{
    width:112px;
    height:112px;
    filter:drop-shadow(0 0 28px var(--accent-glow));
    animation:fadeUp .7s ease;
  }
  .brand-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(52px,14vw,84px);
    letter-spacing:8px;
    line-height:1;
    background:linear-gradient(160deg,#ffffff 0%,var(--accent2) 50%,var(--accent) 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 24px var(--accent-glow));
    animation:fadeUp .7s ease .05s both;
  }
  .brand-sub{
    font-family:var(--font-display);
    font-size:14px;
    letter-spacing:6px;
    color:var(--text-muted);
    font-weight:600;
    text-transform:uppercase;
    margin-top:-8px;
    animation:fadeUp .7s ease .1s both;
  }
  .construccio{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
    padding:8px 18px;
    border:1px solid rgba(245,166,35,0.35);
    background:rgba(245,166,35,0.08);
    border-radius:999px;
    font-family:var(--font-display);
    font-size:13px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--gold);
    animation:fadeUp .7s ease .15s both;
  }
  .construccio .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--gold);
    animation:pulse 1.6s ease-in-out infinite;
  }

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* ── FOOTER ── */
  footer{
    position:relative;
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:0 24px 32px;
  }
  .social-row{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .social-label{
    font-family:var(--font-body);
    font-size:12px;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-muted);
    transition:opacity .2s,max-width .3s,margin .3s;
  }
  .social-icon{
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--surface3);
    border:1px solid var(--border2);
    color:var(--accent2);
    transition:background .2s,box-shadow .2s,transform .2s;
  }
  .social-icon:hover{
    background:var(--surface2);
    box-shadow:0 0 0 3px var(--accent-glow);
    transform:translateY(-2px);
  }
  .social-icon svg{width:19px;height:19px;fill:currentColor;}
  .contact-email{
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--text-muted);
    text-decoration:none;
    letter-spacing:.3px;
    border-bottom:1px solid transparent;
    transition:color .2s,border-color .2s;
  }
  .contact-email:hover{color:var(--accent2);border-color:var(--accent2);}

  /* footer variant toggle — hides the label in "icons only" mode */
  footer.icons-only .social-label{
    opacity:0;
    max-width:0;
    overflow:hidden;
    margin:0;
  }

  @media (max-width:640px){
    .brand-icon{width:88px;height:88px;}
    header{justify-content:space-between;}
  }
</style>
</head>
<body>

<header>
  <div class="lang-switcher">
    <button type="button" class="lang-btn active">CA</button>
    <button type="button" class="lang-btn">ES</button>
  </div>
  <div class="header-divider"></div>
  <a href="/" class="area-soci">Àrea del soci</a>
</header>
